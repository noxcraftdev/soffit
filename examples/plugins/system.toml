description = "System stats: CPU 1-minute load average, memory usage, and uptime"
components = ["cpu", "mem", "uptime"]
has_compact = true

[theme.value]
palette_role = "subtle"

[theme.icon]
palette_role = "muted"

[theme.healthy]
palette_role = "success"

[theme.warning]
palette_role = "warning"

[theme.critical]
palette_role = "danger"

[icons.cpu]
label = "CPU Icon"
icons_field = "cpu"
default_value = "⚡"
is_char = false

[icons.mem]
label = "Memory Icon"
icons_field = "mem"
default_value = "🧠"
is_char = false

[icons.uptime]
label = "Uptime Icon"
icons_field = "uptime"
default_value = "⏳"
is_char = false
